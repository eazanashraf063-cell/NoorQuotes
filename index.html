<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noor Quotes</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0f1115;
  --card:#171a21;
  --text:#e6e6e6;
  --accent:#6ee7ff;
}

body.light {
  --bg:#f7f8fa;
  --card:#ffffff;
  --text:#1f2937;
  --accent:#2563eb;
}

body {
  margin:0;
  font-family:Inter;
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  transition:0.3s;
  background-size:cover;
  background-position:center;
  overflow:hidden;
}

body::before {
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.3);
  z-index:-1;
}

button {
  border:none;
  border-radius:10px;
  background:var(--accent);
  color:#000;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

button:hover {
  transform:scale(1.03);
}

.top {
  position:fixed;
  top:15px;
  right:15px;
  display:flex;
  gap:10px;
  z-index:10;
}

.settings {
  position:relative;
}

.panel {
  display:none;
  position:absolute;
  right:0;
  top:40px;
  background:var(--card);
  padding:12px;
  border-radius:10px;
  width:240px;
}

/* MOOD SCREEN */

.mood-screen {
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.mood-card {
  background:var(--card);
  padding:40px;
  border-radius:18px;
  text-align:center;
  max-width:700px;
  width:100%;
}

.moods {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px;
}

.moods button {
  padding:14px;
  font-size:15px;
}

/* VERSE */

.container {
  text-align:center;
  max-width:700px;
  padding:20px;
}

.card {
  background:var(--card);
  padding:40px;
  border-radius:16px;
}

.verse {
  font-size:20px;
  line-height:1.7;
  min-height:120px;
  opacity:0;
  transition:0.4s;
}

.verse-btn {
  margin-top:15px;
  padding:10px 14px;
}

.back-btn {
  margin-bottom:20px;
}

.fav-btn {
  margin-left:10px;
  background:gold;
}

/* SETTINGS UI */

.setting-title {
  margin:10px 0 6px;
  font-size:13px;
  opacity:0.8;
}

.small-btn {
  width:100%;
  margin-bottom:6px;
  padding:8px;
  font-size:12px;
}
</style>
</head>

<body>

<div class="top">

  <button id="themeBtn" onclick="toggleTheme()">🌙</button>

  <div class="settings">

    <button onclick="toggleSettings()">⚙️</button>

    <div id="panel" class="panel">

      <!-- VERSE STYLE -->
      <div class="setting-title">Verse Style</div>

      <button class="small-btn" onclick="setStyle('all')">All</button>
      <button class="small-btn" onclick="setStyle('calm')">Calm</button>
      <button class="small-btn" onclick="setStyle('motivational')">Motivational</button>
      <button class="small-btn" onclick="setStyle('deep')">Deep</button>
      <button class="small-btn" onclick="setStyle('short')">Short</button>

      <!-- BACKGROUNDS -->
      <div class="setting-title">Background</div>

      <button class="small-btn" onclick="setBg('none')">Default</button>
      <button class="small-btn" onclick="setBg('night')">Night Sky</button>
      <button class="small-btn" onclick="setBg('ocean')">Ocean</button>
      <button class="small-btn" onclick="setBg('gradient')">Gradient</button>

      <!-- FAVORITES -->
      <div class="setting-title">Favourites</div>

      <button class="small-btn" onclick="viewFavourites()">View ⭐</button>

    </div>

  </div>

</div>

<!-- MOOD SCREEN -->
<div id="moodScreen" class="mood-screen">

  <div class="mood-card">

    <h1>How are you feeling?</h1>

    <div class="moods">

      <button onclick="startVerses('Anxious')">Anxious</button>
      <button onclick="startVerses('Depressed')">Depressed</button>
      <button onclick="startVerses('Apathetic')">Apathetic</button>
      <button onclick="startVerses('Irritable')">Irritable</button>
      <button onclick="startVerses('Hopeless')">Hopeless</button>
      <button onclick="startVerses('Melancholy')">Melancholy</button>
      <button onclick="startVerses('Overwhelmed')">Overwhelmed</button>
      <button onclick="startVerses('Resentful')">Resentful</button>
      <button onclick="startVerses('Lonely')">Lonely</button>
      <button onclick="startVerses('Guilty')">Guilty</button>
      <button onclick="startVerses('Fearful')">Fearful</button>
      <button onclick="startVerses('Restless')">Restless</button>

    </div>

  </div>

</div>

<!-- VERSE SCREEN -->
<div class="container" id="verseScreen" style="display:none;">

  <div class="card">

    <button class="back-btn" onclick="goBack()">← Back</button>

    <div id="verse" class="verse"></div>

    <button class="verse-btn" onclick="showVerse()">A Du'a, please</button>
    <button class="fav-btn" onclick="saveFavourite()">⭐</button>

  </div>

</div>

<script>

/* =========================
   DATA (MOODS + STYLES)
========================= */

const moodVerses = {

  Anxious: {
    calm: ["Breathe. Allah is near."],
    motivational: ["Do not lose hope."],
    deep: ["Your heart is not alone."],
    short: ["Trust Him."]
  },

  Depressed: {
    calm: ["With hardship comes ease."],
    motivational: ["Keep going."],
    deep: ["Allah sees what you feel."],
    short: ["It will pass."]
  },

  Fearful: {
    calm: ["Allah is with you."],
    motivational: ["Face it with faith."],
    deep: ["Nothing happens without His will."],
    short: ["Fear not."]
  },

  Restless: {
    calm: ["Remember Allah, hearts find peace."],
    motivational: ["Slow down."],
    deep: ["Rest is also worship."],
    short: ["Pause."]
  }

};

/* =========================
   STATE
========================= */

let currentMood = "";
let currentStyle = "all";
let currentList = [];

/* =========================
   START
========================= */

function startVerses(mood) {

  currentMood = mood;

  loadVerses();

  document.getElementById("moodScreen").style.display = "none";
  document.getElementById("verseScreen").style.display = "block";

  showVerse();
}

/* =========================
   LOAD VERSES BASED ON STYLE
========================= */

function loadVerses() {

  const data = moodVerses[currentMood];

  if (!data) {
    currentList = ["No verses found"];
    return;
  }

  if (currentStyle === "all") {

    currentList = Object.values(data).flat();

  } else {

    currentList = data[currentStyle] || [];
  }
}

/* =========================
   VERSE
========================= */

function showVerse() {

  const box = document.getElementById("verse");

  if (!currentList.length) return;

  const v = currentList[Math.floor(Math.random() * currentList.length)];

  box.style.opacity = 0;

  setTimeout(() => {
    box.innerText = v;
    box.style.opacity = 1;
  }, 200);
}

/* =========================
   BACK
========================= */

function goBack() {

  document.getElementById("verseScreen").style.display = "none";
  document.getElementById("moodScreen").style.display = "flex";
}

/* =========================
   STYLE FILTER
========================= */

function setStyle(style) {

  currentStyle = style;

  if (currentMood) {
    loadVerses();
    showVerse();
  }
}

/* =========================
   BACKGROUNDS
========================= */

function setBg(type) {

  if (type === "none") {
    document.body.style.backgroundImage = "none";
  }

  if (type === "night") {
    document.body.style.backgroundImage =
      "url('https://images.unsplash.com/photo-1506744038136-46273834b3fb')";
  }

  if (type === "ocean") {
    document.body.style.backgroundImage =
      "url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e')";
  }

  if (type === "gradient") {
    document.body.style.backgroundImage =
      "linear-gradient(120deg,#0f1115,#1f2937)";
  }
}

/* =========================
   FAVORITES
========================= */

function saveFavourite() {

  const verse =
    document.getElementById("verse").innerText;

  let favs =
    JSON.parse(localStorage.getItem("favs")) || [];

  favs.push(verse);

  localStorage.setItem("favs", JSON.stringify(favs));

  alert("Saved ⭐");
}

function viewFavourites() {

  let favs =
    JSON.parse(localStorage.getItem("favs")) || [];

  alert(favs.join("\n\n") || "No favourites yet.");
}

/* =========================
   SETTINGS
========================= */

function toggleSettings() {

  const p = document.getElementById("panel");

  p.style.display =
    p.style.display === "block" ? "none" : "block";
}

/* =========================
   THEME
========================= */

function toggleTheme() {

  document.body.classList.toggle("light");

  const btn = document.getElementById("themeBtn");

  btn.innerText =
    document.body.classList.contains("light")
      ? "☀️"
      : "🌙";
}

</script>

</body>
</html>
