<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Najwa - Spiritual Comfort</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f8fa;--card:#fff;--text:#1f2937;--accent:#2563eb}
body.dark{--bg:#0f1115;--card:#171a21;--text:#e6e6e6;--accent:#6ee7ff}
body{margin:0;font-family:Inter,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;justify-content:center;align-items:center;overflow:hidden;transition:.3s}
button{border:none;border-radius:12px;background:var(--accent);color:#fff;font-weight:600;cursor:pointer;padding:12px;transition:.2s}
button:hover{transform:translateY(-2px)}
.top{position:fixed;top:15px;right:15px;display:flex;gap:10px}
.panel{display:none;position:absolute;right:0;top:45px;background:var(--card);padding:14px;border-radius:14px;width:220px;box-shadow:0 10px 30px rgba(0,0,0,.15)}
.screen{position:absolute;inset:0;display:flex;justify-content:center;align-items:center;padding:20px}.hidden{display:none!important}
.card{background:var(--card);padding:40px;border-radius:22px;text-align:center;max-width:650px;width:100%;box-shadow:0 20px 50px rgba(0,0,0,.1)}
.moods{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-top:20px}.moods button{background:transparent;color:var(--text);border:1px solid var(--accent)}
.verse{opacity:0;transform:translateY(5px);transition:.25s}.verse.show{opacity:1;transform:none}
</style>
</head>
<body>
<div class="top">
<button id="themeBtn" onclick="toggleTheme()">🌙</button>
<div style="position:relative">
<button onclick="toggleSettings()">⚙️</button>
<div id="panel" class="panel"><button onclick="viewFavourites()">View Saved ⭐</button></div>
</div></div>
<div id="moodScreen" class="screen"><div class="card"><h1>How are you feeling?</h1><div class="moods"><button onclick="startVerses('Anxious')">Anxious</button><button onclick="startVerses('Depressed')">Depressed</button><button onclick="startVerses('Lonely')">Lonely</button><button onclick="startVerses('Overwhelmed')">Overwhelmed</button><button onclick="startVerses('Guilty')">Ashamed</button><button onclick="startVerses('Betrayed')">Betrayed</button><button onclick="startVerses('Fearful')">Fearful</button><button onclick="startVerses('Restless')">Restless</button></div></div></div>
<div id="verseScreen" class="screen hidden"><div class="card"><button onclick="goBack()">← Back</button><div id="verse" class="verse"></div><button id="nextBtn">Another Du'a</button><button onclick="saveFavourite()">Save ⭐</button></div></div>
<script>
const moodVerses={Anxious:[{arabic:'اللّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْهَمِّ وَالْحَزَنِ',transliteration:'Allahumma inni audhu bika minal-hammi wal-hazan',meaning:'O Allah, I seek refuge in You from anxiety and sorrow.'}],Depressed:[{arabic:'إِنَّ مَعَ الْعُسْرِ يُسْرًا',transliteration:'Inna maal usri yusra',meaning:'Indeed, with hardship comes ease.'}],Lonely:[{arabic:'وَهُوَ مَعَكُمْ أَيْنَ مَا كُنتُمْ',transliteration:'Wa huwa maakum ayna ma kuntum',meaning:'He is with you wherever you are.'}],Overwhelmed:[{arabic:'لَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللَّهِ',transliteration:'La hawla wa la quwwata illa billah',meaning:'No power except with Allah.'}],Guilty:[{arabic:'أَسْتَغْفِرُ اللَّهَ',transliteration:'Astaghfirullah',meaning:'I seek forgiveness from Allah.'}],Betrayed:[{arabic:'حَسْبِيَ اللَّهُ',transliteration:'Hasbiyallah',meaning:'Allah is sufficient for me.'}],Fearful:[{arabic:'لَا تَخَفْ إِنَّ اللَّهَ مَعَنَا',transliteration:'La takhaf innallaha maana',meaning:'Do not fear; Allah is with us.'}],Restless:[{arabic:'أَلَا بِذِكْرِ اللَّهِ تَطْمَئِنُّ الْقُلُوبُ',transliteration:'Ala bidhikrillahi tatmainnul qulub',meaning:'In Allah remembrance hearts find peace.'}]};
let currentMood='',currentVerseIndex=-1;
const moodScreen=document.getElementById('moodScreen'),verseScreen=document.getElementById('verseScreen'),verse=document.getElementById('verse');
function startVerses(m){currentMood=m;showVerse();moodScreen.classList.add('hidden');verseScreen.classList.remove('hidden')}
function showVerse(){const v=moodVerses[currentMood][0];verse.classList.remove('show');setTimeout(()=>{verse.innerHTML=`<div style='font-size:30px;direction:rtl'>${v.arabic}</div><div><i>${v.transliteration}</i></div><div>${v.meaning}</div>`;verse.classList.add('show')},200)}
function goBack(){verseScreen.classList.add('hidden');moodScreen.classList.remove('hidden')}
function toggleSettings(){panel.style.display=panel.style.display==='block'?'none':'block'}
function toggleTheme(){document.body.classList.toggle('dark')}
function saveFavourite(){localStorage.setItem('fav',verse.innerHTML);alert('Saved ⭐')}
function viewFavourites(){const f=localStorage.getItem('fav');if(!f)return alert('No favourites');verse.innerHTML=f;moodScreen.classList.add('hidden');verseScreen.classList.remove('hidden')}
document.getElementById('nextBtn').onclick=showVerse;
</script>
</body>
</html>
