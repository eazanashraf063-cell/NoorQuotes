<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Invocation</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Default: Deep Sea Theme */
            --bg: linear-gradient(135deg, #09203f 0%, #537895 100%);
            --text: #ffffff;
            --accent: #00d2ff;
            --btn-bg: rgba(255, 255, 255, 0.1);
            --transition-speed: 0.6s;
        }

        /* --- THEME DEFINITIONS --- */
        body.mist { 
            --bg: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
            --text: #1f2937; 
            --accent: #2563eb; 
            --btn-bg: rgba(0, 0, 0, 0.05); 
        }
        body.midnight { 
            --bg: linear-gradient(135deg, #0f1115 0%, #1a1d23 100%); 
            --text: #e6e6e6; 
            --accent: #6ee7ff; 
            --btn-bg: rgba(255, 255, 255, 0.05); 
        }
        body.olive { 
            --bg: linear-gradient(135deg, #ebebe0 0%, #a3ad91 100%); 
            --text: #2f3e30; 
            --accent: #4a5d4b; 
            --btn-bg: rgba(0, 0, 0, 0.05); 
        }
        body.golden { 
            --bg: linear-gradient(135deg, #fff1eb 0%, #ffdf91 100%); 
            --text: #4a3728; 
            --accent: #b3932d; 
            --btn-bg: rgba(255, 255, 255, 0.1); 
        }

        /* --- CORE STYLES --- */
        body { 
            margin: 0; 
            padding: 0;
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            background-attachment: fixed;
            color: var(--text); 
            height: 100vh; 
            width: 100vw;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden; 
            transition: background var(--transition-speed) ease; 
            -webkit-tap-highlight-color: transparent;
        }

        .brand-name {
            position: fixed; 
            top: 35px; 
            left: 35px;
            font-size: 10px; 
            letter-spacing: 6px;
            text-transform: uppercase; 
            opacity: 0.4;
            font-weight: 600; 
            z-index: 1000;
        }

        /* --- WELCOME SCREEN --- */
        #welcomeScreen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 2000;
            background: var(--bg);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .welcome-content {
            animation: fadeInWelcome 1.5s ease-out;
            text-align: center;
            padding: 40px;
        }

        #welcomeScreen h1 {
            font-weight: 300; 
            letter-spacing: 16px;
            text-transform: uppercase; 
            margin-bottom: 25px;
            font-size: 2.5rem;
        }

        #welcomeScreen p {
            font-style: italic; 
            opacity: 0.7;
            font-weight: 300; 
            letter-spacing: 1px;
            max-width: 350px; 
            line-height: 2;
            margin: 0 auto;
        }

        .tap-hint {
            position: absolute; 
            bottom: 60px;
            font-size: 9px; 
            letter-spacing: 5px;
            text-transform: uppercase; 
            opacity: 0.3;
            animation: pulseHint 3s infinite ease-in-out;
        }

        @keyframes pulseHint {
            0%, 100% { opacity: 0.1; transform: translateY(0); }
            50% { opacity: 0.5; transform: translateY(-3px); }
        }

        @keyframes fadeInWelcome {
            0% { opacity: 0; filter: blur(10px); transform: scale(0.98); }
            100% { opacity: 1; filter: blur(0); transform: scale(1); }
        }

        /* --- NAVIGATION --- */
        .top-nav { 
            position: fixed; 
            top: 25px; 
            right: 25px; 
            z-index: 100; 
            transition: opacity 0.5s ease;
        }
        
        .panel { 
            display: none; 
            position: absolute; 
            right: 0; 
            top: 60px; 
            background: var(--btn-bg); 
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            padding: 25px; 
            border-radius: 28px; 
            width: 240px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: panelFadeIn 0.3s ease;
        }

        @keyframes panelFadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- SCREEN MANAGEMENT --- */
        .screen { 
            position: absolute; 
            inset: 0; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            padding: 40px; 
            text-align: center; 
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .hidden { 
            opacity: 0 !important; 
            pointer-events: none; 
            transform: translateY(15px); 
        }

        /* --- BUTTONS --- */
        button { 
            border: 1px solid rgba(128, 128, 128, 0.2); 
            border-radius: 20px; 
            background: var(--btn-bg); 
            color: var(--text); 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            outline: none; 
            font-family: 'Inter', sans-serif;
        }

        button:active { transform: scale(0.95); }

        /* --- CONTENT AREAS --- */
        .moods { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            width: 100%; 
            max-width: 450px; 
        }

        .moods button { 
            padding: 25px 10px; 
            font-weight: 400; 
            font-size: 14px; 
            letter-spacing: 1px; 
        }

        .verse { 
            font-size: 24px; 
            line-height: 1.8; 
            font-weight: 300;
            min-height: 200px; 
            margin: 40px 0; 
            max-width: 650px; 
            white-space: pre-line; 
            opacity: 0; 
            transition: opacity 0.4s ease;
        }

        .verse.show { 
            opacity: 1; 
        }

        .fav-item { 
            padding: 35px; 
            border-bottom: 1px solid rgba(255,255,255,0.08); 
            text-align: left; 
            width: 100%; 
            max-width: 550px;
        }
    </style>
</head>
<body class="deepsea">

<div class="brand-name">Invocation</div>

<div id="welcomeScreen" onclick="enterApp()">
    <div class="welcome-content">
        <h1>Invocation</h1>
        <p>"Whispered du’as for every state of the heart"</p>
    </div>
    <div class="tap-hint">Tap anywhere to begin</div>
</div>

<div class="top-nav hidden" id="navUi">
    <button style="background:none; border:none; font-size:1.6rem; padding:10px; opacity:0.5;" onclick="toggleSettings()">⚙️</button>
    <div id="panel" class="panel">
        <button style="width:100%; padding:15px; margin-bottom:15px; font-weight:600;" onclick="viewFavourites()">⭐ Favourites</button>
        <div style="font-size:10px; opacity:0.4; text-transform:uppercase; letter-spacing:2px; margin-bottom:12px;">Themes</div>
        <div style="display:grid; gap:8px;">
            <button onclick="setTheme('deepsea')" style="padding:10px; font-size:12px;">Deep Sea</button>
            <button onclick="setTheme('mist')" style="padding:10px; font-size:12px;">Morning Mist</button>
            <button onclick="setTheme('midnight')" style="padding:10px; font-size:12px;">Midnight</button>
            <button onclick="setTheme('olive')" style="padding:10px; font-size:12px;">Olive Grove</button>
            <button onclick="setTheme('golden')" style="padding:10px; font-size:12px;">Golden Hour</button>
        </div>
    </div>
</div>

<div id="moodScreen" class="screen hidden">
    <h2 style="font-weight:300; margin-bottom:40px; letter-spacing:1px; opacity:0.8;">How is your heart?</h2>
    <div class="moods">
        <button onclick="startVerses('Anxious')">Anxious</button>
        <button onclick="startVerses('Depressed')">Depressed</button>
        <button onclick="startVerses('Lonely')">Lonely</button>
        <button onclick="startVerses('Overwhelmed')">Overwhelmed</button>
        <button onclick="startVerses('Guilty')">Ashamed</button>
        <button onclick="startVerses('Betrayed')">Betrayed</button>
        <button onclick="startVerses('Fearful')">Fearful</button>
        <button onclick="startVerses('Restless')">Restless</button>
    </div>
</div>

<div id="verseScreen" class="screen hidden">
    <button style="background:none; border:none; color:var(--accent); margin-bottom:30px; letter-spacing:2px; font-size:12px;" onclick="showScreen('moodScreen')">← BACK TO MOODS</button>
    <div id="verse" class="verse"></div>
    <div style="width:100%; max-width:400px; display:flex; flex-direction:column; gap:12px;">
        <!-- Text updated below -->
        <button style="padding:18px; font-weight:600; letter-spacing:1px;" onclick="showVerse()">Another Du'a, Please</button>
        <div style="display:flex; gap:12px;">
            <button id="saveBtn" style="flex:1; padding:14px;" onclick="saveFavourite()">Save ⭐</button>
            <button id="copyBtn" style="flex:1; padding:14px;" onclick="copyVerse()">Copy 📋</button>
        </div>
    </div>
</div>

<div id="favScreen" class="screen hidden" style="justify-content:flex-start; overflow-y:auto;">
    <h2 style="margin-top:100px; font-weight:300; letter-spacing:4px; text-transform:uppercase; font-size:18px;">Saved</h2>
    <button style="background:none; border:none; color:var(--accent); margin-bottom:20px; font-size:12px; letter-spacing:2px;" onclick="showScreen('moodScreen')">← HOME</button>
    <div id="favList" style="width:100%; margin-top:20px;"></div>
</div>

<script>
    const moodVerses = {
        Anxious: [
            "اللهم إني أعوذ بك من الهم والحزن\nAllāhumma innī a‘ūdhu bika min al-hammi wal-ḥazan\nO Allah, I seek refuge in You from anxiety and sorrow.",
            "حسبي الله لا إله إلا هو عليه توكلت\nḤasbiyallāhu lā ilāha illā Huwa, ‘alayhi tawakkaltu\nAllah is sufficient for me; I rely on Him.",
            "اللهم رحمتك أرجو فلا تكلني إلى نفسي طرفة عين\nAllāhumma raḥmataka arjū fa-lā takilnī ilā nafsī ṭarfata ‘ayn\nO Allah, I hope for Your mercy, do not leave me to myself even for a moment."
        ],
        Depressed: [
            "لَا إِلَٰهَ إِلَّا أَنتَ سُبْحَانَكَ إِنِّي كُنتُ مِنَ الظَّالِمِينَ\nLā ilāha illā anta subḥānaka innī kuntu minaẓ-ẓālimīn\nThere is no deity except You; glory be to You.",
            "إِنَّ مَعَ الْعُسْرِ يُسْرًا\nInna ma‘al usri yusra\nIndeed, with hardship comes ease.",
            "اللَّهُمَّ اشْفِ صَدْرِي\nAllahumma ishfi sadri\nO Allah, heal my heart."
        ],
        Lonely: [
            "اللَّهُمَّ آنِسْ وَحْشَتِي\nAllahumma anis wahshati\nO Allah, comfort my loneliness.",
            "وَهُوَ مَعَكُمْ أَيْنَ مَا كُنتُمْ\nWa huwa ma‘akum ayna mā kuntum\nAnd He is with you wherever you are.",
            "رَبِّ لَا تَذَرْنِي فَرْدًا وَأَنْتَ خَيْرُ الْوَارِثِينَ\nRabbi la tadharni fardan wa anta khayrul waritheen\nMy Lord, do not leave me alone."
        ],
        Overwhelmed: [
            "لَا يُكَلِّفُ اللَّهُ نَفْسًا إِلَّا وُسْعَهَا\nLa yukallifullahu nafsan illa wus‘aha\nAllah does not burden a soul beyond what it can bear.",
            "رَبِّ اشْرَحْ لِي صَدْرِي وَيَسِّرْ لِي أَمْرِي\nRabbi ishrah li sadri wa yassir li amri\nMy Lord, expand for me my chest and make my task easy.",
            "حَسْبُنَا اللَّهُ وَنِعْمَ الْوَكِيلُ\nHasbunallahu wa ni‘mal wakeel\nAllah is sufficient for us."
        ],
        Guilty: [
            "لَا تَقْنَطُوا مِنْ رَحْمَةِ اللَّهِ\nLa taqnatoo min rahmatillah\nDo not despair of the mercy of Allah.",
            "رَبِّ اغْفِرْ لِي وَتُبْ عَلَيَّ\nRabbi ighfir li wa tub ‘alayya\nMy Lord, forgive me and accept my repentance.",
            "إِنَّ اللَّهَ يَغْفِرُ الذُّنُوبَ جَمِيعًا\nInnallaha yaghfiru dhunooba jamee‘a\nIndeed, Allah forgives all sins."
        ],
        Betrayed: [
            "فَصَبْرٌ جَمِيلٌ\nFasabrun jameel\nSo patience is most fitting.",
            "إِنَّ اللَّهَ مَعَ الصَّابِرِينَ\nInna Allaha ma‘a as-sabireen\nIndeed, Allah is with the patient.",
            "وَأُفَوِّضُ أَمْرِي إِلَى اللَّهِ\nWa ufawwidu amri ilallah\nI entrust my affair to Allah."
        ],
        Fearful: [
            "لَا تَخَافْ إِنَّ اللَّهَ مَعَنَا\nLa takhaf innallaha ma‘ana\nDo not fear, indeed Allah is with us.",
            "إِنِّي تَوَكَّلْتُ عَلَى اللَّهِ\nInni tawakkaltu ‘ala Allah\nIndeed, I place my trust in Allah.",
            "اللَّهُمَّ آمِنْ رَوْعَاتِي\nAllahumma amin raw‘ati\nO Allah, grant me safety in my fear."
        ],
        Restless: [
            "أَلَا بِذِكْرِ اللَّهِ تَطْمَئِنُّ الْقُلُوبُ\nAla bidhikrillahi tatma’innul quloob\nVerily, in the remembrance of Allah do hearts find rest.",
            "اللَّهُمَّ أَلْهِمْنِي السَّكِينَةَ\nAllahumma alhimni as-sakeenata\nO Allah, inspire in me peace.",
            "يَا حَيُّ يَا قَيُّومُ أَصْلِحْ لِي شَأْنِي كُلَّهُ\nYa Hayyu Ya Qayyum aslih li sha’ni kullahu\nO Ever-Living, set right all my affairs."
        ]
    };

    let currentMood = "";
    let lastIdx = -1;

    function enterApp() {
        const welcome = document.getElementById('welcomeScreen');
        const nav = document.getElementById('navUi');
        const mood = document.getElementById('moodScreen');

        welcome.style.opacity = '0';
        welcome.style.transform = 'scale(1.02)';
        
        setTimeout(() => {
            welcome.style.display = 'none';
            nav.classList.remove('hidden');
            mood.classList.remove('hidden');
        }, 400);
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.getElementById('panel').style.display = "none";
        document.getElementById(id).classList.remove('hidden');
    }

    function startVerses(mood) {
        currentMood = mood;
        showScreen('verseScreen');
        showVerse();
    }

    function showVerse() {
        const v = document.getElementById('verse');
        const list = moodVerses[currentMood];
        let idx;
        
        do { 
            idx = Math.floor(Math.random() * list.length); 
        } while (idx === lastIdx && list.length > 1);
        
        lastIdx = idx;
        v.classList.remove('show');
        
        setTimeout(() => {
            v.innerText = list[idx];
            v.classList.add('show');
            document.getElementById('saveBtn').innerText = "Save ⭐";
        }, 100);
    }

    function setTheme(t) {
        document.body.className = t;
        localStorage.setItem('inv-theme', t);
    }

    function toggleSettings() {
        const p = document.getElementById('panel');
        p.style.display = p.style.display === "block" ? "none" : "block";
    }

    function saveFavourite() {
        let favs = JSON.parse(localStorage.getItem('inv-favs')) || [];
        const text = document.getElementById('verse').innerText;
        if(!favs.includes(text)) {
            favs.push(text);
            localStorage.setItem('inv-favs', JSON.stringify(favs));
            document.getElementById('saveBtn').innerText = "Saved!";
        }
    }

    function copyVerse() {
        navigator.clipboard.writeText(document.getElementById('verse').innerText);
        const btn = document.getElementById('copyBtn');
        btn.innerText = "Copied!";
        setTimeout(() => btn.innerText = "Copy 📋", 2000);
    }

    function viewFavourites() {
        const list = document.getElementById('favList');
        const favs = JSON.parse(localStorage.getItem('inv-favs')) || [];
        list.innerHTML = favs.length ? "" : "<p style='opacity:0.4; margin-top:40px;'>No saved du'as yet.</p>";
        favs.forEach((f, i) => {
            const d = document.createElement('div');
            d.className = 'fav-item';
            d.innerHTML = `
                <div>${f}</div>
                <button onclick="removeFav(${i})" style="margin-top:20px; background:none; border:none; color:#ff5f5f; font-size:11px; letter-spacing:1px; padding: 5px;">REMOVE</button>
            `;
            list.appendChild(d);
        });
        showScreen('favScreen');
    }

    function removeFav(i) {
        let favs = JSON.parse(localStorage.getItem('inv-favs'));
        favs.splice(i, 1);
        localStorage.setItem('inv-favs', JSON.stringify(favs));
        viewFavourites();
    }

    window.onload = () => {
        const savedTheme = localStorage.getItem('inv-theme') || 'deepsea';
        setTheme(savedTheme);
    };
</script>
</body>
</html>
