<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Najwa - Spiritual Comfort</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Najwa">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg:#f7f8fa; --card:#ffffff; --text:#1f2937; --accent:#2563eb; }
        body.dark { --bg:#0f1115; --card:#171a21; --text:#e6e6e6; --accent:#6ee7ff; }
       
        body {
            margin:0; font-family:'Inter', sans-serif;
            background: var(--bg);
            color:var(--text);
            height:100vh; display:flex; justify-content:center; align-items:center;
            overflow:hidden; transition: background-color 0.3s ease, color 0.3s ease;
        }
        button { 
            border:none; border-radius:12px; background:var(--accent); 
            color:#fff; font-weight:600; cursor:pointer; transition:0.2s ease; 
        }
        body.dark button { color: #000; }
        button:hover { transform:translateY(-2px); filter: brightness(1.1); }
        button:active { transform:scale(0.97); }

        .top { position:fixed; top:15px; right:15px; display:flex; gap:10px; z-index:20; }
        .panel {
            display:none; position:absolute; right:0; top:45px;
            background:var(--card); padding:14px; border-radius:14px;
            width:240px; box-shadow:0 10px 30px rgba(0,0,0,0.15);
            animation:fadeIn 0.2s ease;
        }
        body.dark .panel { box-shadow:0 10px 30px rgba(0,0,0,0.4); }
        .screen { position:absolute; inset:0; display:flex; justify-content:center; align-items:center; padding:20px; }
        .hidden { display:none !important; }
        .mood-card, .card {
            background:var(--card); padding:40px; border-radius:22px;
            text-align:center; max-width:600px; width:100%;
            box-shadow:0 20px 50px rgba(0,0,0,0.1);
        }
        body.dark .mood-card, body.dark .card { box-shadow:0 20px 50px rgba(0,0,0,0.35); }
        .moods { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:12px; margin-top:20px; }
       
        .moods button {
            padding:14px; border-radius:14px; color: var(--text);
            background: transparent; border: 1px solid var(--accent);
        }
        .moods button:hover { background: var(--accent); color: #fff; }
        body.dark .moods button:hover { color: #000; }

        .verse {
            font-size:18px; line-height:1.8; min-height:120px;
            opacity:0; transform:translateY(5px); 
            transition: opacity 0.25s ease, transform 0.25s ease;
            margin: 20px 0; white-space: pre-line;
        }
        .verse.show { opacity:1; transform:translateY(0); }
        .verse-btn { padding:12px 20px; width: 100%; margin-top: 10px; }
        .back-btn { background: transparent; color: var(--accent); margin-bottom: 15px; font-size: 14px; }
        .back-btn:hover { background: rgba(0,0,0,0.05); color: var(--accent); }
        body.dark .back-btn:hover { background: rgba(255,255,255,0.05); }
        .fav-btn { margin-top: 10px; background:transparent; border: 1px solid #d4af37; color: #d4af37; padding: 10px; width: 100%; }
        .fav-btn:hover { background: #d4af37; color: #fff; }
        body.dark .fav-btn:hover { color: #000; }
        .small-btn { width:100%; margin-bottom:6px; padding:9px; border-radius:10px; }

        #installBtn {
            background: linear-gradient(135deg, #2563eb, #3b82f6);
        }
        @keyframes fadeIn { from {opacity:0; transform:translateY(8px);} to {opacity:1; transform:translateY(0);} }
    </style>
</head>
<body>
<div class="top">
    <button id="themeBtn" onclick="toggleTheme()" style="padding: 10px; background: transparent; font-size: 1.2rem;">🌙</button>
    <div style="position:relative;">
        <button onclick="toggleSettings()" style="padding: 10px; background: transparent; font-size: 1.2rem;">⚙️</button>
        <div id="panel" class="panel">
            <button class="small-btn" onclick="viewFavourites()">View Saved ⭐</button>
            <button class="small-btn" id="installBtn" onclick="installApp()" style="display:none;">
                📲 Install App
            </button>
        </div>
    </div>
</div>

<div id="moodScreen" class="screen">
    <div class="mood-card">
        <h1>How are you feeling?</h1>
        <div class="moods">
            <button onclick="startVerses('Anxious')">Anxious</button>
            <button onclick="startVerses('Depressed')">Depressed</button>
            <button onclick="startVerses('Lonely')">Lonely</button>
            <button onclick="startVerses('Overwhelmed')">Overwhelmed</button>
            <button onclick="startVerses('Guilty')">Ashamed</button>
            <button onclick="startVerses('Betrayed')">Betrayed</button>
            <button onclick="startVerses('Fearful')">Fearful</button>
            <button onclick="startVerses('Restless')">Restless</button>
        </div>
    </div>
</div>

<div id="verseScreen" class="screen hidden">
    <div class="card">
        <button class="back-btn" onclick="goBack()">← Back to Moods</button>
        <div id="verse" class="verse"></div>
        <button class="verse-btn" id="nextBtn">Get another Du'a</button>
        <button class="fav-btn" onclick="saveFavourite()">Save to Favourites ⭐</button>
    </div>
</div>

<script>
    const moodVerses = {
        Anxious: [ /* ... Paste all your original arrays here (unchanged) ... */ ],
        Depressed: [ /* ... */ ],
        Lonely: [ /* ... */ ],
        Overwhelmed: [ /* ... */ ],
        Guilty: [ /* ... */ ],
        Betrayed: [ /* ... */ ],
        Fearful: [ /* ... */ ],
        Restless: [ /* ... */ ]
    };

    let currentMood = "";
    let currentVerseIndex = -1;
    let deferredPrompt = null;

    // PWA Install Prompt
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installBtn').style.display = 'block';
    });

    async function installApp() {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
            document.getElementById('installBtn').style.display = 'none';
        }
        deferredPrompt = null;
    }

    function startVerses(mood) {
        currentMood = mood;
        currentVerseIndex = -1;
        document.getElementById("moodScreen").classList.add("hidden");
        document.getElementById("verseScreen").classList.remove("hidden");
        showVerse();
    }

    function showVerse() {
        const box = document.getElementById("verse");
        const list = moodVerses[currentMood] || ["No Du'as found."];
        
        let newIndex;
        do {
            newIndex = Math.floor(Math.random() * list.length);
        } while (newIndex === currentVerseIndex && list.length > 1);

        currentVerseIndex = newIndex;
        const v = list[newIndex];

        box.classList.remove("show");
        void box.offsetWidth; // Force reflow for smooth transition

        setTimeout(() => {
            box.innerText = v;
            box.classList.add("show");
        }, 30);
    }

    function goBack() {
        document.getElementById("verseScreen").classList.add("hidden");
        document.getElementById("moodScreen").classList.remove("hidden");
    }

    function toggleSettings() {
        const p = document.getElementById("panel");
        p.style.display = (p.style.display === "block") ? "none" : "block";
    }

    function toggleTheme() {
        document.body.classList.toggle("dark");
        document.getElementById("themeBtn").innerText = document.body.classList.contains("dark") ? "☀️" : "🌙";
    }

    function saveFavourite() {
        const verse = document.getElementById("verse").innerText;
        if (!verse) return;
        let favs = JSON.parse(localStorage.getItem("favs")) || [];
        if (!favs.includes(verse)) {
            favs.push(verse);
            localStorage.setItem("favs", JSON.stringify(favs));
            alert("Saved to Favourites ⭐");
        } else {
            alert("Already in Favourites!");
        }
    }

    function viewFavourites() {
        let favs = JSON.parse(localStorage.getItem("favs")) || [];
        if (favs.length === 0) {
            alert("No favourites saved yet.");
        } else {
            alert("Your Favourites:\n\n" + favs.join("\n\n---\n\n"));
        }
    }

    // Service Worker Registration
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(() => console.log('Service Worker Registered'))
                .catch(err => console.log('SW Error:', err));
        });
    }

    // Attach Next Button
    document.getElementById("nextBtn").addEventListener("click", showVerse);
</script>
</body>
</html>
