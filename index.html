<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Najwa</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0f1115;
  --card:#171a21;
  --text:#e6e6e6;
  --accent:#6ee7ff;
}

body.light {
  --bg:#f7f8fa;
  --card:#ffffff;
  --text:#1f2937;
  --accent:#2563eb;
}

body {
  margin:0;
  font-family:Inter;
  background:linear-gradient(180deg,var(--bg),#0b0d10);
  color:var(--text);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  transition:0.4s ease;
}

/* BUTTONS */
button {
  border:none;
  border-radius:12px;
  background:var(--accent);
  color:#000;
  font-weight:600;
  cursor:pointer;
  transition:0.25s ease;
}

button:hover {
  transform:translateY(-2px);
}

button:active {
  transform:scale(0.97);
}

/* TOP BAR */
.top {
  position:fixed;
  top:15px;
  right:15px;
  display:flex;
  gap:10px;
  z-index:20;
}

.settings {
  position:relative;
}

.panel {
  display:none;
  position:absolute;
  right:0;
  top:45px;
  background:var(--card);
  padding:14px;
  border-radius:14px;
  width:240px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  animation:fadeIn 0.2s ease;
}

/* SCREENS */
.screen {
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.hidden {
  display:none !important;
}

/* MOOD CARD */
.mood-card {
  background:var(--card);
  padding:42px;
  border-radius:22px;
  text-align:center;
  max-width:720px;
  width:100%;
  box-shadow:0 20px 50px rgba(0,0,0,0.35);
}

.moods {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px;
  margin-top:20px;
}

.moods button {
  padding:14px;
  border-radius:14px;
}

/* VERSE CARD */
.container {
  text-align:center;
  max-width:720px;
  padding:20px;
}

.card {
  background:var(--card);
  padding:42px;
  border-radius:22px;
  box-shadow:0 20px 50px rgba(0,0,0,0.35);
}

.verse {
  font-size:20px;
  line-height:1.7;
  min-height:120px;
  opacity:0;
  transform:translateY(8px);
  transition:0.4s ease;
}

.verse.show {
  opacity:1;
  transform:translateY(0);
}

/* BUTTONS */
.verse-btn {
  margin-top:18px;
  padding:12px 16px;
}

.back-btn {
  margin-bottom:20px;
}

.fav-btn {
  margin-left:10px;
  background:gold;
}

/* TEXT */
.setting-title {
  margin:10px 0 6px;
  font-size:12px;
  opacity:0.7;
}

.small-btn {
  width:100%;
  margin-bottom:6px;
  padding:9px;
  border-radius:10px;
}

/* ANIMATION */
@keyframes fadeIn {
  from {opacity:0; transform:translateY(8px);}
  to {opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div class="top">

<button id="themeBtn" onclick="toggleTheme()">🌙</button>

<div class="settings">

<button onclick="toggleSettings()">⚙️</button>

<div id="panel" class="panel">

<div class="setting-title">Favourites</div>
<button class="small-btn" onclick="viewFavourites()">View ⭐</button>

</div>
</div>
</div>

<!-- MOOD SCREEN -->
<div id="moodScreen" class="screen">

<div class="mood-card">

<h1>How are you feeling?</h1>

<div class="moods">
<button onclick="startVerses('Anxious')">Anxious</button>
<button onclick="startVerses('Depressed')">Depressed</button>
<button onclick="startVerses('Lonely')">Lonely</button>
<button onclick="startVerses('Overwhelmed')">Overwhelmed</button>
<button onclick="startVerses('Irritable')">Irritable</button>
<button onclick="startVerses('Ashamed')">Ashamed</button>
<button onclick="startVerses('Betrayed')">Betrayed</button>
<button onclick="startVerses('Fearful')">Fearful</button>
<button onclick="startVerses('Restless')">Restless</button>
</div>

</div>
</div>

<!-- VERSE SCREEN -->
<div id="verseScreen" class="screen hidden">

<div class="container">
<div class="card">

<button class="back-btn" onclick="goBack()">← Back</button>

<div id="verse" class="verse"></div>

<button class="verse-btn" onclick="showVerse()">A Du'a, please</button>
<button class="fav-btn" onclick="saveFavourite()">⭐</button>

</div>
</div>
</div>

<script>

const moodVerses = {
Anxious:["
اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْهَمِّ وَالْحَزَنِ
Transliteration:
Allahumma inni a‘udhu bika minal-hammi wal-hazan
Meaning:
O Allah, I seek refuge in You from anxiety and sorrow."],
Depressed:["With hardship comes ease.","It will pass."],
Lonely:["You are never alone.","Allah is closer than you think."],
Overwhelmed:["Allah does not burden a soul beyond it can bear.","Take it step by step."],
Irritable:["Remember Allah in patience.","Calm your heart."],
Ashamed:["Do not despair of Allah’s mercy.","He forgives all sins."],
Betrayed:["Trust Allah’s plan.","He is the best of planners."],
Fearful:["Allah is with you.","Fear not."],
Restless:["Remember Allah, hearts find peace.","Pause and breathe."]
};

let currentMood="";
let currentList=[];

function startVerses(mood){
currentMood=mood;
loadVerses();

document.getElementById("moodScreen").classList.add("hidden");
document.getElementById("verseScreen").classList.remove("hidden");

showVerse();
}

function loadVerses(){
currentList=moodVerses[currentMood]||["No du'as found"];
}

function showVerse(){

const box=document.getElementById("verse");

const v=currentList[Math.floor(Math.random()*currentList.length)];

box.classList.remove("show");

setTimeout(()=>{
box.innerText=v;
box.classList.add("show");
},150);

}

function goBack(){
document.getElementById("verseScreen").classList.add("hidden");
document.getElementById("moodScreen").classList.remove("hidden");
}

function toggleSettings(){
const p=document.getElementById("panel");
p.style.display=p.style.display==="block"?"none":"block";
}

function toggleTheme(){
document.body.classList.toggle("light");
document.getElementById("themeBtn").innerText=
document.body.classList.contains("light")?"☀️":"🌙";
}

function saveFavourite(){
const verse=document.getElementById("verse").innerText;
let favs=JSON.parse(localStorage.getItem("favs"))||[];
favs.push(verse);
localStorage.setItem("favs",JSON.stringify(favs));
alert("Saved ⭐");
}

function viewFavourites(){
let favs=JSON.parse(localStorage.getItem("favs"))||[];
alert(favs.join("\n\n")||"No favourites yet.");
}

</script>

</body>
</html>
