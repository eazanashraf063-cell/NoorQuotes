<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Najwa</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0f1115;
  --card:#171a21;
  --text:#e6e6e6;
  --accent:#6ee7ff;
}

body.light {
  --bg:#f7f8fa;
  --card:#ffffff;
  --text:#1f2937;
  --accent:#2563eb;
}

body {
  margin:0;
  font-family:Inter;
  background:linear-gradient(180deg,var(--bg),#0b0d10);
  color:var(--text);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  transition:0.4s ease;
}

button {
  border:none;
  border-radius:12px;
  background:var(--accent);
  color:#000;
  font-weight:600;
  cursor:pointer;
  transition:0.25s ease;
}

button:hover { transform:translateY(-2px); }
button:active { transform:scale(0.97); }

.top {
  position:fixed;
  top:15px;
  right:15px;
  display:flex;
  gap:10px;
  z-index:20;
}

.panel {
  display:none;
  position:absolute;
  right:0;
  top:45px;
  background:var(--card);
  padding:14px;
  border-radius:14px;
  width:240px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.screen {
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.hidden { display:none !important; }

.mood-card, .card {
  background:var(--card);
  padding:42px;
  border-radius:22px;
  text-align:center;
  max-width:720px;
  width:100%;
  box-shadow:0 20px 50px rgba(0,0,0,0.35);
}

.moods {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px;
  margin-top:20px;
}

.verse {
  font-size:20px;
  line-height:1.7;
  min-height:120px;
  opacity:0;
  transform:translateY(8px);
  transition:0.4s ease;
}

.verse.show {
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<div class="top">
<button id="themeBtn" onclick="toggleTheme()">🌙</button>

<div style="position:relative;">
<button onclick="toggleSettings()">⚙️</button>

<div id="panel" class="panel">
<div style="font-size:12px; opacity:0.7;">Favourites</div>
<button onclick="viewFavourites()">View ⭐</button>
</div>

</div>
</div>

<!-- MOOD SCREEN -->
<div id="moodScreen" class="screen">
<div class="mood-card">
<h1>How are you feeling?</h1>

<div class="moods">
<button onclick="startVerses('Anxious')">Anxious</button>
<button onclick="startVerses('Depressed')">Depressed</button>
<button onclick="startVerses('Lonely')">Lonely</button>
<button onclick="startVerses('Overwhelmed')">Overwhelmed</button>
<button onclick="startVerses('Guilty')">Guilty</button>
<button onclick="startVerses('Betrayed')">Betrayed</button>
<button onclick="startVerses('Fearful')">Fearful</button>
<button onclick="startVerses('Restless')">Restless</button>
</div>

</div>
</div>

<!-- VERSE SCREEN -->
<div id="verseScreen" class="screen hidden">
<div class="card">

<button onclick="goBack()">← Back</button>

<div id="verse" class="verse"></div>

<button onclick="showVerse()">A Du'a, please</button>
<button onclick="saveFavourite()">⭐</button>

</div>
</div>

<script>

const moodVerses = {

Anxious: [
`اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْهَمِّ وَالْحَزَنِ`,
`حَسْبُنَا اللَّهُ وَنِعْمَ الْوَكِيلُ`,
`لَا إِلَٰهَ إِلَّا أَنتَ سُبْحَانَكَ إِنِّي كُنتُ مِنَ الظَّالِمِينَ`
],

Depressed: [
`اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْهَمِّ وَالْحَزَنِ`,
`لَا إِلَٰهَ إِلَّا أَنتَ سُبْحَانَكَ`,
`إِنَّ مَعَ الْعُسْرِ يُسْرًا`,
`حَسْبِيَ اللَّهُ وَنِعْمَ الْوَكِيلُ`
],

Lonely: [
`اللَّهُمَّ آنِسْ وَحْشَتِي وَاجْبُرْ كَسْرِي`,
`حَسْبِيَ اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ`
],

Overwhelmed: [
`لَا يُكَلِّفُ اللَّهُ نَفْسًا إِلَّا وُسْعَهَا`,
`رَبِّ اشْرَحْ لِي صَدْرِي`
],

Guilty: [
`لَا تَقْنَطُوا مِنْ رَحْمَةِ اللَّهِ`,
`إِنَّ اللَّهَ يُحِبُّ التَّوَّابِينَ`
],

Betrayed: [
`حَسْبِيَ اللَّهُ وَنِعْمَ الْوَكِيلُ`,
`إِنَّ اللَّهَ مَعَ الصَّابِرِينَ`
],

Fearful: [
`إِنِّي تَوَكَّلْتُ عَلَى اللَّهِ`,
`لَا تَخَفْ إِنَّ اللَّهَ مَعَنَا`
],

Restless: [
`أَلَا بِذِكْرِ اللَّهِ تَطْمَئِنُّ الْقُلُوبُ`,
`اللَّهُمَّ أَلْهِمْنِي السَّكِينَةَ`
]

};

let currentMood="";
let currentList=[];

function startVerses(mood){
currentMood=mood;
currentList=moodVerses[mood]||["No du'a found"];

document.getElementById("moodScreen").classList.add("hidden");
document.getElementById("verseScreen").classList.remove("hidden");

showVerse();
}

function showVerse(){
const box=document.getElementById("verse");
const v=currentList[Math.floor(Math.random()*currentList.length)];

box.classList.remove("show");

setTimeout(()=>{
box.innerText=v;
box.classList.add("show");
},150);
}

function goBack(){
document.getElementById("verseScreen").classList.add("hidden");
document.getElementById("moodScreen").classList.remove("hidden");
}

function toggleSettings(){
const p=document.getElementById("panel");
p.style.display=p.style.display==="block"?"none":"block";
}

function toggleTheme(){
document.body.classList.toggle("light");
document.getElementById("themeBtn").innerText=
document.body.classList.contains("light")?"🌙":"☀️";
}

function saveFavourite(){
const verse=document.getElementById("verse").innerText;
let favs=JSON.parse(localStorage.getItem("favs"))||[];
favs.push(verse);
localStorage.setItem("favs",JSON.stringify(favs));
alert("Saved ⭐");
}

function viewFavourites(){
let favs=JSON.parse(localStorage.getItem("favs"))||[];
alert(favs.join("\n\n")||"No favourites yet.");
}

</script>

</body>
</html>
