<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Najwa</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0f1115;
  --card:#171a21;
  --text:#e6e6e6;
  --accent:#6ee7ff;
}

body.light {
  --bg:#f7f8fa;
  --card:#ffffff;
  --text:#1f2937;
  --accent:#2563eb;
}

body {
  margin:0;
  font-family:Inter;
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  transition:0.3s;
  background-size:cover;
  background-position:center;
  overflow:hidden;
}

body::before {
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.3);
  z-index:-1;
}

button {
  border:none;
  border-radius:10px;
  background:var(--accent);
  color:#000;
  font-weight:600;
  cursor:pointer;
}

.top {
  position:fixed;
  top:15px;
  right:15px;
  display:flex;
  gap:10px;
}

.settings {
  position:relative;
}

.panel {
  display:none;
  position:absolute;
  right:0;
  top:40px;
  background:var(--card);
  padding:12px;
  border-radius:10px;
  width:240px;
}

.mood-screen {
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.mood-card {
  background:var(--card);
  padding:40px;
  border-radius:18px;
  text-align:center;
  max-width:700px;
  width:100%;
}

.moods {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px;
}

.moods button {
  padding:14px;
}

.container {
  text-align:center;
  max-width:700px;
  padding:20px;
}

.card {
  background:var(--card);
  padding:40px;
  border-radius:16px;
}

.verse {
  font-size:20px;
  line-height:1.7;
  min-height:120px;
  opacity:0;
  transition:0.4s;
}

.verse-btn {
  margin-top:15px;
  padding:10px 14px;
}

.back-btn {
  margin-bottom:20px;
}

.fav-btn {
  margin-left:10px;
  background:gold;
}

.setting-title {
  margin:10px 0 6px;
  font-size:13px;
  opacity:0.8;
}

.small-btn {
  width:100%;
  margin-bottom:6px;
  padding:8px;
}
</style>
</head>

<body>

<div class="top">

<button id="themeBtn" onclick="toggleTheme()">🌙</button>

<div class="settings">

<button onclick="toggleSettings()">⚙️</button>

<div id="panel" class="panel">

<div class="setting-title">Themes</div>

<button class="small-btn" onclick="setBg('none')">Default</button>
<button class="small-btn" onclick="setBg('night')">Night Sky</button>
<button class="small-btn" onclick="setBg('ocean')">Ocean</button>
<button class="small-btn" onclick="setBg('gradient')">Gradient</button>

<div class="setting-title">Favourites</div>

<button class="small-btn" onclick="viewFavourites()">View ⭐</button>

</div>
</div>
</div>

<div id="moodScreen" class="mood-screen">
<div class="mood-card">

<h1>How are you feeling?</h1>

<div class="moods">
<button onclick="startVerses('Anxious')">Anxious</button>
<button onclick="startVerses('Depressed')">Depressed</button>
<button onclick="startVerses('Fearful')">Fearful</button>
<button onclick="startVerses('Restless')">Restless</button>
</div>

</div>
</div>

<div class="container" id="verseScreen" style="display:none;">
<div class="card">

<button class="back-btn" onclick="goBack()">← Back</button>

<div id="verse" class="verse"></div>

<button class="verse-btn" onclick="showVerse()">A Du'a, please</button>
<button class="fav-btn" onclick="saveFavourite()">⭐</button>

</div>
</div>

<script>

const moodVerses = {

Anxious:[
"Breathe. Allah is near.",
"Trust Him."
],

Depressed:[
"With hardship comes ease.",
"It will pass."
],

Fearful:[
"Allah is with you.",
"Fear not."
],

Restless:[
"Remember Allah, hearts find peace.",
"Pause."
]

};

let currentMood="";
let currentList=[];

function startVerses(mood){
currentMood=mood;
loadVerses();

document.getElementById("moodScreen").style.display="none";
document.getElementById("verseScreen").style.display="block";

showVerse();
}

function loadVerses(){
currentList=moodVerses[currentMood]||["No du'as found"];
}

function showVerse(){

const box=document.getElementById("verse");

const v=currentList[Math.floor(Math.random()*currentList.length)];

box.style.opacity=0;

setTimeout(()=>{
box.innerText=v;
box.style.opacity=1;
},200);

}

function goBack(){
document.getElementById("verseScreen").style.display="none";
document.getElementById("moodScreen").style.display="flex";
}

function setBg(type){

if(type==="none")
document.body.style.backgroundImage="none";

if(type==="night")
document.body.style.backgroundImage=
"url('https://images.unsplash.com/photo-1506744038136-46273834b3fb')";

if(type==="ocean")
document.body.style.backgroundImage=
"url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e')";

if(type==="gradient")
document.body.style.backgroundImage=
"linear-gradient(120deg,#0f1115,#1f2937)";
}

function saveFavourite(){

const verse=document.getElementById("verse").innerText;

let favs=JSON.parse(localStorage.getItem("favs"))||[];

favs.push(verse);

localStorage.setItem("favs",JSON.stringify(favs));

alert("Saved ⭐");
}

function viewFavourites(){

let favs=JSON.parse(localStorage.getItem("favs"))||[];

alert(favs.join("\n\n")||"No favourites yet.");
}

function toggleSettings(){

const p=document.getElementById("panel");

p.style.display=p.style.display==="block"?"none":"block";
}

function toggleTheme(){

document.body.classList.toggle("light");

const btn=document.getElementById("themeBtn");

btn.innerText=document.body.classList.contains("light")?"☀️":"🌙";
}

</script>

</body>
</html>
