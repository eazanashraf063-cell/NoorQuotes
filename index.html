<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Daily Invocation | Spiritual Du'as</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --app-height: 100vh;
            --bg: linear-gradient(135deg, #09203f 0%, #537895 100%);
            --text: #ffffff;
            --accent: #00d2ff;
            --btn-bg: rgba(255, 255, 255, 0.12);
            --card-bg: rgba(255, 255, 255, 0.08);
            --sat: env(safe-area-inset-top, 0px);
            --sab: env(safe-area-inset-bottom, 0px);
        }

        body.deepsea { --bg: linear-gradient(135deg, #09203f 0%, #537895 100%); --text: #ffffff; --accent: #00d2ff; }
        body.mist { --bg: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); --text: #1f2937; --accent: #2563eb; --btn-bg: rgba(0, 0, 0, 0.06); --card-bg: rgba(0, 0, 0, 0.04); }
        body.midnight { --bg: linear-gradient(135deg, #0f1115 0%, #1a1d23 100%); --text: #e6e6e6; --accent: #6ee7ff; --btn-bg: rgba(255, 255, 255, 0.06); --card-bg: rgba(255, 255, 255, 0.04); }
        body.olive { --bg: linear-gradient(135deg, #ebebe0 0%, #a3ad91 100%); --text: #2f3e30; --accent: #4a5d4b; --btn-bg: rgba(0, 0, 0, 0.06); --card-bg: rgba(0, 0, 0, 0.04); }
        body.golden { --bg: linear-gradient(135deg, #fff1eb 0%, #ffdf91 100%); --text: #4a3728; --accent: #b3932d; --btn-bg: rgba(255, 255, 255, 0.15); --card-bg: rgba(255, 255, 255, 0.1); }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { height: var(--app-height); width: 100%; overflow: hidden; position: fixed; background: #09203f; font-family: 'Inter', sans-serif; color: var(--text); }
        body { background: var(--bg); transition: background 0.8s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; }

        header {
            position: absolute; top: 0; left: 0; right: 0;
            padding: calc(20px + var(--sat)) 25px 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 2000; opacity: 0; visibility: hidden; transition: 0.5s ease;
        }
        header.visible { opacity: 1; visibility: visible; }
        .brand { font-size: 11px; letter-spacing: 5px; text-transform: uppercase; font-weight: 600; opacity: 0.6; cursor: pointer; }
        
        /* Premium Settings Icon */
        .settings-btn { 
            background: none; border: none; cursor: pointer; color: inherit; 
            padding: 8px; z-index: 2200; display: flex; align-items: center; justify-content: center;
        }
        .settings-btn svg { width: 22px; height: 22px; opacity: 0.8; stroke-width: 1.5; }

        .panel { 
            position: absolute; right: 25px; top: calc(75px + var(--sat)); 
            background: var(--btn-bg); backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px);
            padding: 20px; border-radius: 28px; width: 220px; border: 1px solid rgba(255, 255, 255, 0.1); 
            z-index: 2100; opacity: 0; visibility: hidden; transform: translateY(-10px); transition: 0.3s ease;
        }
        .panel.active { opacity: 1; visibility: visible; transform: translateY(0); }
        .panel-btn { width: 100%; padding: 12px; margin-bottom: 6px; border-radius: 12px; font-size: 12px; text-align: left; background: rgba(255,255,255,0.05); color: inherit; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
        .theme-dot { width: 8px; height: 8px; border-radius: 50%; }

        /* New Quick Access Bar */
        .quick-nav {
            position: fixed; bottom: calc(30px + var(--sab)); left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 1500; opacity: 0; pointer-events: none; transition: 0.5s ease;
        }
        .quick-nav.visible { opacity: 1; pointer-events: auto; }
        .nav-pill {
            background: var(--btn-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 12px 24px; border-radius: 30px; font-size: 10px; font-weight: 600; letter-spacing: 2px;
            text-transform: uppercase; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; color: inherit;
            display: flex; align-items: center; gap: 8px; transition: 0.3s;
        }
        .nav-pill:active { transform: scale(0.95); opacity: 0.8; }
        .nav-pill svg { width: 14px; height: 14px; }

        .screen { 
            position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden; transition: 0.4s ease; transform: scale(0.96);
            padding: 20px; padding-top: calc(80px + var(--sat)); padding-bottom: calc(100px + var(--sab));
            z-index: 500; pointer-events: none;
        }
        .screen.active { opacity: 1; visibility: visible; transform: scale(1); pointer-events: auto; }
        .screen-scroll { overflow-y: auto; -webkit-overflow-scrolling: touch; display: block; }

        #welcomeScreen { z-index: 3000; padding-top: 0; cursor: pointer; padding-bottom: 0; }
        .welcome-title { font-weight: 300; letter-spacing: 12px; text-transform: uppercase; font-size: 2.2rem; margin-bottom: 20px; text-align: center; }
        .welcome-subtitle { font-style: italic; opacity: 0.6; line-height: 1.8; font-size: 15px; text-align: center; max-width: 280px; }

        .mood-container { width: 100%; overflow-x: auto; display: flex; scroll-snap-type: x mandatory; padding: 40px 0; scrollbar-width: none; }
        .mood-container::-webkit-scrollbar { display: none; }
        .mood-card {
            flex: 0 0 78vw; height: 380px; margin: 0 12px; background: var(--card-bg); 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 40px; 
            scroll-snap-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; cursor: pointer; transition: transform 0.3s;
        }
        .mood-card:active { transform: scale(0.97); }
        .mood-card h3 { font-size: 28px; font-weight: 300; margin-bottom: 10px; }
        .mood-card p { font-size: 13px; opacity: 0.5; font-style: italic; padding: 0 35px; line-height: 1.5; }

        .back-nav { background: none; border: none; color: var(--accent); margin-bottom: 20px; letter-spacing: 3px; font-size: 10px; cursor: pointer; text-transform: uppercase; font-weight: 600; padding: 12px; width: fit-content; align-self: center; }

        /* Premium Transition Container */
        #verseContent {
            will-change: transform, opacity;
        }

        .arabic { font-family: 'Amiri', serif; font-size: clamp(24px, 6vw, 32px); line-height: 1.8; margin-bottom: 20px; direction: rtl; text-align: center; padding: 0 10px; }
        .translit { font-size: 13px; opacity: 0.5; font-style: italic; margin-bottom: 12px; text-align: center; line-height: 1.6; padding: 0 25px; }
        .translation { font-size: 16px; line-height: 1.6; text-align: center; padding: 0 25px; font-weight: 300; }

        .btn-stack { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; margin-top: 35px; }
        .main-btn { padding: 18px; border-radius: 20px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; font-size: 11px; background: var(--btn-bg); color: inherit; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; transition: transform 0.2s, background 0.2s; }
        .main-btn:active { transform: scale(0.98); background: rgba(255,255,255,0.15); }
        .main-btn.hidden { display: none; }
        .icon-btn { flex: 1; padding: 14px; border-radius: 16px; font-size: 10px; text-transform: uppercase; background: var(--btn-bg); color: inherit; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; font-weight: 600; letter-spacing: 1px; transition: transform 0.2s; }
        .icon-btn:active { transform: scale(0.95); }

        .list-stack { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 500px; padding-bottom: 120px; margin: 0 auto; }
        .list-item { padding: 25px; border-radius: 28px; background: var(--btn-bg); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; text-align: center; }
        .list-item h4 { font-size: 14px; margin-bottom: 4px; letter-spacing: 1px; font-weight: 600; }
        .list-item p { font-size: 11px; opacity: 0.5; font-style: italic; }

        .toast {
            position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: rgba(0,0,0,0.85); color: white; padding: 14px 28px; border-radius: 30px;
            font-size: 11px; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0; z-index: 9000; pointer-events: none; letter-spacing: 1px;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        #loader { position: fixed; inset: 0; background: #09203f; z-index: 10000; display: flex; align-items: center; justify-content: center; transition: 0.6s; pointer-events: none; }
        .spinner { width: 35px; height: 35px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="deepsea">

<div id="loader"><div class="spinner"></div></div>

<header id="appHeader">
    <div class="brand" onclick="forceHome()">Daily Invocation</div>
    <button class="settings-btn" id="triggerSettings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 4.5h14.25M3 9h9.75M3 13.5h5.25m5.25-.75L17.25 9m0 0L21 12.75M17.25 9v12" />
        </svg>
    </button>
    <div id="settingsPanel" class="panel">
        <div style="font-size: 9px; opacity: 0.4; letter-spacing: 2px; margin: 0 5px 15px;">THEMES</div>
        <button class="panel-btn" onclick="setTheme('deepsea')">Deep Sea <span class="theme-dot" style="background:#09203f"></span></button>
        <button class="panel-btn" onclick="setTheme('mist')">Mist <span class="theme-dot" style="background:#f5f7fa"></span></button>
        <button class="panel-btn" onclick="setTheme('midnight')">Midnight <span class="theme-dot" style="background:#0f1115"></span></button>
        <button class="panel-btn" onclick="setTheme('golden')">Golden Hour <span class="theme-dot" style="background:#ffdf91"></span></button>
        <button class="panel-btn" onclick="setTheme('olive')">Olive Grove <span class="theme-dot" style="background:#4a5d4b"></span></button>
    </div>
</header>

<div id="welcomeScreen" class="screen active">
    <h1 class="welcome-title">Daily Invocation</h1>
    <p class="welcome-subtitle">Healing du’as for the restless heart</p>
    <p style="font-size: 10px; margin-top: 50px; letter-spacing: 4px; opacity: 0.4; font-weight: 600;">TAP TO START</p>
</div>

<div id="moodScreen" class="screen">
    <h2 style="font-weight: 300; margin-bottom: 25px; opacity: 0.8; font-size: 1.2rem; letter-spacing: 1px;">How is your heart?</h2>
    <div class="mood-container" id="moodGrid"></div>
</div>

<div id="protectScreen" class="screen screen-scroll">
    <div style="max-width: 500px; width: 100%; margin: 0 auto; padding: 20px; display: flex; flex-direction: column;">
        <button class="back-nav" onclick="goBack()">← Back</button>
        <h2 style="font-weight: 300; margin-bottom: 30px; text-align: center; letter-spacing: 1px;">Protection & Safety</h2>
        <div id="protectList" class="list-stack"></div>
    </div>
</div>

<div id="verseScreen" class="screen">
    <button class="back-nav" onclick="goBack()">← Back</button>
    <div id="shareArea" style="padding: 25px; border-radius: 40px; width: 100%; max-width: 450px;">
        <div id="verseContent"></div>
    </div>
    <div class="btn-stack">
        <button id="nextBtn" class="main-btn" onclick="nextVerse()">Another Du'a please</button>
        <div style="display:flex; gap:8px;">
            <button class="icon-btn" onclick="saveFav()">Save</button>
            <button class="icon-btn" onclick="copyVerse()">Copy</button>
            <button class="icon-btn" onclick="snap()">Share</button>
        </div>
    </div>
</div>

<div id="favScreen" class="screen screen-scroll">
    <div style="max-width: 500px; width: 100%; margin: 0 auto; padding: 20px; display: flex; flex-direction: column;">
        <button class="back-nav" onclick="goBack()">← Back</button>
        <h2 style="font-weight: 300; margin-bottom: 30px; text-align: center; letter-spacing: 1px;">Favourites</h2>
        <div id="favList" class="list-stack"></div>
    </div>
</div>

<nav id="quickNav" class="quick-nav">
    <button class="nav-pill" onclick="navigate('protectScreen')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Protection
    </button>
    <button class="nav-pill" onclick="navigate('favScreen')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l8.84-8.84 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        Saved
    </button>
</nav>

<div id="toast" class="toast"></div>

<script>
    const dbData = {
        Anxious: [
            "اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْهَمِّ وَالْحَزَنِ\nAllāhumma innī a‘ūdhu bika min al-hammi wal-ḥazan\nO Allah, I seek refuge in You from anxiety and sorrow.",
            "حَسْبِيَ اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ عَلَيْهِ تَوَكَّلْتُ\nḤasbiyallāhu lā ilāha illā Huwa ‘alayhi tawakkaltu\nAllah is sufficient for me; there is no deity except Him.",
            "يَا حَيُّ يَا قَيُّومُ بِرَحْمَتِكَ أَسْتَغِيثُ\nYā Ḥayyu yā Qayyūmu bi-raḥmatika astaghīth\nO Ever-Living, O Self-Sustaining, I seek relief through Your mercy.",
            "اللَّهُمَّ رَحْمَتَكَ أَرْجُو فَلَا تَكِلْنِي إِلَى نَفْسِي\nAllāhumma raḥmataka arjū falā takilnī ilā nafsī\nO Allah, I hope for Your mercy, do not leave me to myself for even a blink.",
            "رَبَّنَا لَا تُزِغْ قُلُوبَنَا بَعْدَ إِذْ هَدَيْتَنَا\nRabbanā lā tuzigh qulūbanā ba‘da idh hadaytanā\nOur Lord, do not let our hearts deviate after You have guided us.",
            "لَا إِلَهَ إِلَّا اللهُ الْحَلِيمُ الْكَرِيمُ\nLā ilāha illallāhul-Ḥalīmul-Karīm\nThere is no deity but Allah, the Forbearing, the Generous.",
            "اللَّهُمَّ إِنِّي أَسْأَلُكَ الْعَفْوَ وَالْعَافِيَةَ\nAllāhumma innī as’alukal-‘afwa wal-‘āfiyah\nO Allah, I ask You for forgiveness and well-being.",
            "رَبِّ اشْرَحْ لِي صَدْرِي\nRabbi-shraḥ lī ṣadrī\nMy Lord, expand for me my chest.",
            "اللَّهُمَّ اجْعَلْ نَفْسِي مُطْمَئِنَّةً\nAllāhumma-j‘al nafsī muṭma’innah\nO Allah, make my soul tranquil.",
            "فَاللَّهُ خَيْرٌ حَافِظًا\nFallāhu khayrun ḥāfiẓā\nBut Allah is the best guardian."
        ],
        Depressed: [
            "لَّا إِلَٰهَ إِلَّا أَنتَ سُبْحَانَكَ إِنِّي كُنتُ مِنَ الظَّالِمِينَ\nLā ilāha illā anta subḥānaka innī kuntu min al-ẓālimīn\nThere is no deity except You; glory be to You. I have been of the wrongdoers.",
            "إِنَّمَا أَشْكُو بَثِّي وَحُزْنِي إِلَى اللَّهِ\nInnamā ashkū baththī wa ḥuznī ilallāh\nI only complain of my suffering and my grief to Allah.",
            "رَبِّ إِنِّي مَسَّنِيَ الضُّرُّ وَأَنْتَ أَرْحَمُ الرَّاحِمِينَ\nRabbi innī massaniya-ḍ-ḍurru wa anta arḥamu-r-rāḥimīn\nMy Lord, indeed adversity has touched me, and You are the Most Merciful.",
            "اللَّهُمَّ لَا مَلْجَأَ وَلَا مَنْجَا مِنْكَ إِلَّا إِلَيْكَ\nAllāhumma lā malja’a wa lā manjā minka illā ilayk\nO Allah, there is no refuge or safety from You except in You.",
            "يَا مُقَلِّبَ الْقُلُوبِ ثَبِّتْ قَلْبِي عَلَى دِينِكَ\nYā Muqallibal-qulūbi thabbit qalbī ‘alā dīnik\nO Turner of hearts, keep my heart firm upon Your religion.",
            "رَبِّ لَا تَذَرْنِي فَرْدًا\nRabbi lā tadharnī fardan\nMy Lord, do not leave me alone.",
            "اللَّهُمَّ إِنِّي عَبْدُكَ وَابْنُ عَبْدِكَ\nAllāhumma innī ‘abduka wa-bnu ‘abdik\nO Allah, I am Your servant, the son of Your servant.",
            "أَمَّن يُجِيبُ الْمُضْطَرَّ إِذَا دَعَاهُ\nAmman yujībul-muḍṭarra idhā da‘āh\nIs He not the One Who responds to the distressed when he calls?",
            "لَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللَّهِ\nLā ḥawla wa lā quwwata illā billāh\nThere is no might nor power except with Allah.",
            "إِنَّ مَعَ الْعُسْرِ يُسْرًا\nInna ma‘al-‘usri yusrā\nIndeed, with hardship comes ease."
        ],
        Lonely: [
            "اللَّهُمَّ آنِسْ وَحْشَتِي\nAllāhumma ānis waḥshatī\nO Allah, comfort my loneliness.",
            "وَهُوَ مَعَكُمْ أَيْنَ مَا كُنتُمْ\nWa huwa ma‘akum ayna mā kuntum\nAnd He is with you wherever you are.",
            "وَنَحْنُ أَقْرَبُ إِلَيْهِ مِنْ حَبْلِ الْوَرِيدِ\nWa naḥnu aqrabu ilayhi min ḥablil-warīd\nAnd We are closer to him than his jugular vein.",
            "أَلَيْسَ اللَّهُ بِكَافٍ عَبْدَهُ\nAlaysallāhu bi-kāfin ‘abdah\nIs Allah not sufficient for His servant?",
            "رَبِّ إِنِّي لِمَا أَنزَلْتَ إِلَيَّ مِنْ خَيْرٍ فَقِيرٌ\nRabbi innī limā anzalta ilayya min khayrin faqīr\nMy Lord, indeed I am in need of whatever good You would send down to me.",
            "اللَّهُمَّ ارْحَمْ غُرْبَتِي\nAllāhummar-ḥam ghurbatī\nO Allah, have mercy on my estrangement.",
            "إِنَّ رَبِّي قَرِيبٌ مُّجِيبٌ\nInna Rabbī qarībun mujīb\nIndeed, my Lord is near and responsive.",
            "فَإِنَّكَ قَرِيبٌ\nFa-innaka qarīb\nFor indeed, You are near.",
            "اللَّهُمَّ ثَبِّتْ رَجَاءَكَ فِي قَلْبِي\nAllāhumma thabbit rajā’aka fī qalbī\nO Allah, firm Your hope in my heart.",
            "مَا وَدَّعَكَ رَبُّكَ وَمَا قَلَى\nMā wadda‘aka Rabbuka wa mā qalā\nYour Lord has not forsaken you, nor has He detested you."
        ],
        Overwhelmed: [
            "رَبِّ اشْرَحْ لِي صَدْرِي وَيَسِّرْ لِي أَمْرِي\nRabbi-shraḥ lī ṣadrī wa yassir lī amrī\nMy Lord, expand for me my chest and ease for me my task.",
            "اللَّهُمَّ لَا سَهْلَ إِلَّا مَا جَعَلْتَهُ سَهْلًا\nAllāhumma lā sahla illā mā ja‘altahu sahlā\nO Allah, there is nothing easy except what You make easy.",
            "تَوَكَّلْتُ عَلَى اللَّهِ\nTawakkaltu ‘alallāh\nI place my trust in Allah.",
            "اللَّهُمَّ كَفِّنِي بِحَلَالِكَ عَنْ حَرَامِكَ\nAllāhumma-kfinī bi-ḥalālika ‘an ḥarāmik\nO Allah, suffice me with Your lawful against Your prohibited.",
            "رَبِّ زِدْنِي عِلْمًا\nRabbi zidnī ‘ilmā\nMy Lord, increase me in knowledge.",
            "اللَّهُمَّ إِنِّي أَسْأَلُكَ الْيَقِينَ\nAllāhumma innī as’alukal-yaqīn\nO Allah, I ask You for certainty.",
            "يَا ذَا الْجَلَالِ وَالْإِكْرَامِ\nYā Dhal-Jalāli wal-Ikrām\nO Owner of Majesty and Honor.",
            "سُبْحَانَ اللَّهِ وَبِحَمْدِهِ\nSubḥānallāhi wa bi-ḥamdih\nGlory be to Allah and praise to Him.",
            "اللَّهُمَّ أَعِنِّي عَلَى ذِكْرِكَ\nAllāhumma a‘innī ‘alā dhikrika\nO Allah, help me to remember You.",
            "اللَّهُمَّ بَارِكْ لِي فِيمَا رَزَقْتَنِي\nAllāhumma bārik lī fīmā razaqtanī\nO Allah, bless me in what You have provided."
        ],
        Ashamed: [
            "لَا تَقْنَطُوا مِن رَّحْمَةِ اللَّهِ\nLā taqnaṭū min raḥmatillāh\nDo not despair of the mercy of Allah.",
            "اللَّهُمَّ إِنَّكَ عَفُوٌّ تُحِبُّ الْعَفْوَ فَاعْفُ عَنِّي\nAllāhumma innaka ‘Afuwwun tuḥibbul-‘afwa fa‘fu ‘annī\nO Allah, You are Forgiving and love forgiveness, so forgive me.",

            "اللَّهُمَّ اغْفِرْ لِي مَا قَدَّمْتُ\nAllāhumma-ghfir lī mā qaddamtu\nO Allah, forgive me for what I have sent forth.",

            "يَا غَفَّارُ اغْفِرْ لِي\nYā Ghaffāru-ghfir lī\nO All-Forgiving, forgive me."
        ],
        Angry: [
            "أَعُوذُ بِاللَّهِ مِنَ الشَّيْطَانِ الرَّجِيمِ\nA‘ūdhu billāhi minash-shayṭānir-rajīm\nI seek refuge in Allah from the accursed devil.",
            "اللَّهُمَّ اغْفِرْ لِي ذَنْبِي وَأَذْهِبْ غَيْظَ قَلْبِي\nAllāhumma-ghfir lī dhanbī wa adh-hib ghayẓa qalbī\nO Allah, forgive my sin and take away the anger of my heart.",
            "اللَّهُمَّ أَعِذْنِي مِنَ الشَّيْطَانِ\nAllāhumma a‘idhnī minash-shayṭān\nO Allah, protect me from the devil.",
            "رَبِّ أَعُوذُ بِكَ مِنْ هَمَزَاتِ الشَّيَاطِينِ\nRabbi a‘ūdhu bika min hamazātish-shayāṭīn\nMy Lord, I seek refuge in You from the whispers of the devils.",
            "رَبِّ انصُرْنِي عَلَى نَفْسِي\nRabbi-nṣurnī ‘alā nafsī\nMy Lord, grant me victory over my own self.",
            "اللَّهُمَّ اجْعَلْنِي مِنَ الْكَاظِمِينَ الْغَيْظَ\nAllāhumma-j‘alnī minal-kāẓimīnal-ghayẓ\nO Allah, make me of those who restrain their anger.",
            "حَسْبُنَا اللَّهُ وَنِعْمَ الْوَكِيلُ\nḤasbunallāhu wa ni‘mal-Wakīl\nSufficient for us is Allah, and He is the best Disposer of affairs.",
            "يَا صَبُورُ صَبِّرْنِي\nYā Ṣabūru ṣabbirnī\nO Patient One, grant me patience.",
            "رَبِّ هَبْ لِي حُكْمًا\nRabbi hab lī ḥukmā\nMy Lord, grant me wisdom.",
            "اللَّهُمَّ أَلْهِمْنِي رُشْدِي\nAllāhumma alhimnī rushdī\nO Allah, inspire me with my guidance."
        ],
        Grieving: [
            "إِنَّا لِلَّهِ وَإِنَّا إِلَيْهِ رَاجِعُونَ\nInnā lillāhi wa innā ilayhi rāji‘ūn\nIndeed, we belong to Allah, and indeed to Him we will return.",
            "رَبَّنَا أَفْرِغْ عَلَيْنَا صَبْرًا\nRabbanā afrigh ‘alaynā ṣabrā\nOur Lord, pour upon us patience.",
            "اللَّهُمَّ اجْزِنِي فِي مُصِيبَتِي خَيْرًا\nAllāhumma-j-zunī fī muṣībatī khayrā\nO Allah, compensate me in my affliction with better.",
            "اللَّهُمَّ ارْحَمْ مَوْتَانَا\nAllāhummar-ḥam mawtānā\nO Allah, have mercy on our deceased.",
            "إِنَّمَا الصَّبْرُ عِنْدَ الصَّدْمَةِ الْأُولَى\nInnamā-ṣ-ṣabru ‘inda-ṣ-ṣadmatil-ūlā\nIndeed, patience is at the first stroke of calamity.",
            "رَبِّ اغْفِرْ لِي وَلِوَالِدَيَّ\nRabbigh-fir lī wa li-wālidayya\nMy Lord, forgive me and my parents.",
            "اللَّهُمَّ أَلْهِمْنِي الصَّبْرَ\nAllāhumma alhimnī-ṣ-ṣabr\nO Allah, inspire me with patience.",
            "إِنَّ اللَّهَ مَعَ الصَّابِرِينَ\nInnallāha ma‘a-ṣ-ṣābirīn\nIndeed, Allah is with the patient.",
            "وَبَشِّرِ الصَّابِرِينَ\nWa bashshiri-ṣ-ṣābirīn\nAnd give glad tidings to the patient.",
            "اللَّهُمَّ ارْزُقْنِي الرِّضَا\nAllāhummar-zuqnī-r-riḍā\nO Allah, grant me contentment."
        ],
        Doubtful: [
            "آمَنْتُ بِاللَّهِ وَرُسُلِهِ\nĀmantu billāhi wa rusulih\nI believe in Allah and His Messengers.",
            "رَبِّ زِدْنِي عِلْمًا وَإِيمَانًا\nRabbi zidnī ‘ilman wa īmānā\nMy Lord, increase me in knowledge and faith.",
            "اللَّهُمَّ أَرِنَا الْحَقَّ حَقًّا\nAllāhumma arinal-ḥaqqa ḥaqqā\nO Allah, show us the truth as truth.",
            "اللَّهُمَّ نَوِّرْ قَلْبِي\nAllāhumma nawwir qalbī\nO Allah, enlighten my heart.",
            "اللَّهُمَّ اهْدِنِي لِمَا اخْتُلِفَ فِيهِ\nAllāhumma-hdinī limā-khtulifa fīhi\nO Allah, guide me in that which was differed upon.",
            "رَبِّ لَا تَذَرْنِي ضَالًّا\nRabbi lā tadharnī ḍāllā\nMy Lord, do not leave me astray.",
            "اللَّهُمَّ اغْفِرْ لِي شَكِّي\nAllāhumma-ghfir lī shakkī\nO Allah, forgive my doubt.",
            "فَإِنِّي قَرِيبٌ\nFa-innī qarīb\nFor indeed, I am near.",
            "اللَّهُمَّ أَعِزَّ الْإِيمَانَ فِ قَلْبِي\nAllāhumma a‘izzal-īmāna fī qalbī\nO Allah, strengthen faith in my heart.",
            "اللَّهُمَّ لَكَ أَسْلَمْتُ\nAllāhumma laka aslamtu\nO Allah, to You I have submitted."
        ],
        GeneralProtect: ["حَسْبِيَ اللَّهُ لَا إِلَهَ إِلَّا هُوَ عَلَيْهِ تَوَكَّلْتُ\nḤasbiyallāhu lā ilāha illā Huwa ‘alayhi tawakkaltu\nAllah is sufficient for me; there is no deity except Him. In Him I trust."],
        EvilEye: ["أَعُوذُ بِكَلِمَاتِ اللَّهِ التَّامَّاتِ مِنْ شَرِّ مَا خَلَقَ\nA‘ūdhu bi-kalimātillāhit-tāmmāti min sharri mā khalaq\nI seek refuge in the perfect words of Allah from the evil of what He has created."],
        DailyShield: ["بِسْمِ اللَّهِ الَّذِي لَا يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الْأَرْضِ وَلَا فِي السَّمَاءِ\nBismillāhil-ladhī lā yaḍurru ma‘as-mihi shay’un fil-arḍi wal-samā’\nIn the name of Allah, with Whose name nothing is harmed on earth nor in heaven."],
        SleepSafety: ["اللَّهُمَّ بِاسْمِكَ أَمُوتُ وَأَحْيَا\nAllāhumma bi-asmika amūtu wa aḥyā\nO Allah, in Your name I die and I live."],
        ProtectKids: ["أُعِيذُكُمَا بِكَلِمَاتِ اللَّهِ التَّامَّةِ مِنْ كُلِّ شَيْطَانٍ وَهَامَّةٍ\nU‘īdhukumā bi-kalimātillāhit-tāmmah min kulli shayṭān\nI seek protection for you in the perfect words of Allah from every devil."],
        AgainstFear: ["اللَّهُمَّ اكْفِنِيهِمْ بِمَا شِئْتَ\nAllāhumma-kfinīhim bimā shi’t\nO Allah, suffice me against them however You wish."],
        HealingBody: ["أَذْهِبِ الْبَاسَ رَبَّ النَّاسِ وَاشْفِ أَنْتَ الشَّافِي\nAdh-hibil-ba’sa Rabban-nāsi wa-shfi Antash-Shāfī\nRemove the harm, O Lord of mankind, and heal, for You are the Healer."]
    };

    const moodCards = [
        { id: 'Anxious', title: 'Anxious', desc: 'When the world feels too loud.' },
        { id: 'Depressed', title: 'Depressed', desc: 'When the light feels distant.' },
        { id: 'Lonely', title: 'Lonely', desc: 'Reminding you He is near.' },
        { id: 'Overwhelmed', title: 'Overwhelmed', desc: 'Seeking ease in the burden.' },
        { id: 'Ashamed', title: 'Ashamed', desc: 'Returning to Infinite Mercy.' },
        { id: 'Angry', title: 'Angry', desc: 'Quieting the fire within.' },
        { id: 'Grieving', title: 'Grieving', desc: 'Finding peace in loss.' },
        { id: 'Doubtful', title: 'Doubtful', desc: 'Seeking clarity and firm faith.' }
    ];

    const protectionLibrary = [
        { id: 'GeneralProtect', name: 'General Protection', desc: 'A shield for all affairs.' },
        { id: 'EvilEye', name: 'Evil Eye', desc: 'From envy and hidden harm.' },
        { id: 'DailyShield', name: 'Morning and Evening', desc: 'Daily safety for the soul.' },
        { id: 'SleepSafety', name: 'Before Sleep', desc: 'Rest under Divine protection.' },
        { id: 'ProtectKids', name: 'For Children', desc: 'A prayer for their safety.' },
        { id: 'AgainstFear', name: 'Against Fear', desc: 'Calming the heart from threats.' },
        { id: 'HealingBody', name: 'Physical Healing', desc: 'Seeking health and recovery.' }
    ];

    let state = {
        currentMood: '',
        currentVerse: '',
        history: ['welcomeScreen']
    };

    const haptic = () => { if (window.navigator.vibrate) window.navigator.vibrate(10); };

    const showToast = (msg) => {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    };

    const navigate = (screenId) => {
        haptic();
        document.getElementById('settingsPanel').classList.remove('active');
        
        if (state.history[state.history.length - 1] !== screenId) {
            state.history.push(screenId);
        }

        renderScreen(screenId);
    };

    const goBack = () => {
        if (state.history.length <= 1) return;
        haptic();
        state.history.pop();
        const prev = state.history[state.history.length - 1];
        renderScreen(prev);
    };

    const forceHome = () => {
        haptic();
        state.history = ['welcomeScreen', 'moodScreen'];
        renderScreen('moodScreen');
    };

    const renderScreen = (screenId) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        const target = document.getElementById(screenId);
        if (target) target.classList.add('active');

        const header = document.getElementById('appHeader');
        const qNav = document.getElementById('quickNav');

        if (screenId === 'welcomeScreen') {
            header.classList.remove('visible');
            qNav.classList.remove('visible');
        } else {
            header.classList.add('visible');
            // Hide quick nav on detail screens (verse content) for focus
            if (screenId === 'moodScreen' || screenId === 'protectScreen' || screenId === 'favScreen') {
                qNav.classList.add('visible');
            } else {
                qNav.classList.remove('visible');
            }
        }

        if (screenId === 'favScreen') renderFavs();
    };

    const openMood = (id) => {
        state.currentMood = id;
        nextVerse();
        navigate('verseScreen');
    };

    // Premium Sequential Animation Logic
    const nextVerse = async () => {
        const pool = dbData[state.currentMood];
        if (!pool) return;
        
        haptic(); // Preserve mechanical feel
        
        const isProtection = protectionLibrary.some(p => p.id === state.currentMood);
        const nextBtn = document.getElementById('nextBtn');
        const vContent = document.getElementById('verseContent');
        
        if (isProtection) {
            nextBtn.classList.add('hidden');
        } else {
            nextBtn.classList.remove('hidden');
        }

        const isCurrentlyVisible = state.currentVerse !== '';

        // 1. STAGGERED FADE-OUT
        if (isCurrentlyVisible) {
            nextBtn.style.pointerEvents = 'none'; // Prevent spam clicking
            vContent.style.transition = 'opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.4s cubic-bezier(0.4, 0, 0.2, 1)';
            vContent.style.opacity = '0';
            vContent.style.transform = 'translateY(-15px)';
            
            // Wait for fade out to complete
            await new Promise(r => setTimeout(r, 400));
        }

        // 2. LOGIC SELECTION
        let pick;
        if (pool.length === 1) pick = pool[0];
        else {
            do { pick = pool[Math.floor(Math.random() * pool.length)]; }
            while (pick === state.currentVerse);
        }
        
        state.currentVerse = pick;
        const p = pick.split('\n');
        
        // 3. PREPARE ENTRY STATE (Without transition so it snaps to start position)
        vContent.style.transition = 'none';
        vContent.style.transform = 'translateY(15px)';
        vContent.style.opacity = '0';
        
        vContent.innerHTML = `
            <div class="arabic">${p[0]}</div>
            <div class="translit">${p[1]}</div>
            <div class="translation">${p[2]}</div>
        `;

        // Force browser reflow to apply the initial state before transitioning
        void vContent.offsetWidth; 

        // 4. SMOOTH PREMIUM FADE-IN
        vContent.style.transition = 'opacity 0.5s cubic-bezier(0.23, 1, 0.32, 1), transform 0.5s cubic-bezier(0.23, 1, 0.32, 1)';
        vContent.style.opacity = '1';
        vContent.style.transform = 'translateY(0)';
        
        if (isCurrentlyVisible) {
            // Re-enable button right before animation finishes
            setTimeout(() => { nextBtn.style.pointerEvents = 'auto'; }, 450);
        }
    };

    const saveFav = () => {
        haptic();
        let favs = JSON.parse(localStorage.getItem('inv_f') || '[]');
        if (favs.some(v => v.text === state.currentVerse)) return showToast("Already saved");
        favs.push({ id: Date.now(), text: state.currentVerse });
        localStorage.setItem('inv_f', JSON.stringify(favs));
        showToast("Saved to Favourites");
    };

    const renderFavs = () => {
        const list = document.getElementById('favList');
        const items = JSON.parse(localStorage.getItem('inv_f') || '[]');
        if (!items.length) {
            list.innerHTML = "<p style='opacity:0.4; text-align:center; padding:60px;'>No saved du'as yet.</p>";
            return;
        }
        list.innerHTML = items.map(f => {
            const p = f.text.split('\n');
            return `
                <div class="list-item">
                    <div class="arabic" style="font-size:18px;">${p[0]}</div>
                    <div class="translation" style="font-size:13px; margin-top:8px;">${p[2]}</div>
                    <button style="background:none; border:none; color:#ff6b6b; font-size:9px; margin-top:15px; cursor:pointer; padding:8px;" onclick="deleteFav(${f.id})">REMOVE</button>
                </div>
            `;
        }).join('');
    };

    const deleteFav = (id) => {
        haptic();
        let items = JSON.parse(localStorage.getItem('inv_f') || '[]').filter(f => f.id !== id);
        localStorage.setItem('inv_f', JSON.stringify(items));
        renderFavs();
        showToast("Removed");
    };

    const copyVerse = () => {
        haptic();
        const el = document.createElement('textarea');
        el.value = state.currentVerse;
        document.body.appendChild(el); el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        showToast("Copied");
    };

    const snap = () => {
        haptic();
        const l = document.getElementById('loader');
        l.style.display = 'flex'; l.style.opacity = '0.7';
        html2canvas(document.getElementById('shareArea'), { scale: 2 }).then(canvas => {
            const a = document.createElement('a');
            a.download = 'Daily_Invocation.png'; 
            a.href = canvas.toDataURL(); 
            a.click();
            l.style.display = 'none';
        });
    };

    const setTheme = (t) => { 
        haptic();
        document.body.className = t; 
        showToast(t); 
        document.getElementById('settingsPanel').classList.remove('active');
    };

    window.onload = () => {
        document.getElementById('welcomeScreen').onclick = () => navigate('moodScreen');
        
        document.getElementById('moodGrid').innerHTML = '<div style="flex:0 0 10vw;"></div>' + moodCards.map(m => `
            <div class="mood-card" onclick="openMood('${m.id}')">
                <h3>${m.title}</h3>
                <p>${m.desc}</p>
            </div>
        `).join('') + '<div style="flex:0 0 10vw;"></div>';

        document.getElementById('protectList').innerHTML = protectionLibrary.map(p => `
            <div class="list-item" onclick="openMood('${p.id}')">
                <h4>${p.name.toUpperCase()}</h4>
                <p>${p.desc}</p>
            </div>
        `).join('');

        document.getElementById('triggerSettings').onclick = (e) => {
            e.stopPropagation();
            haptic();
            document.getElementById('settingsPanel').classList.toggle('active');
        };

        document.addEventListener('click', (e) => {
            if (!document.getElementById('settingsPanel').contains(e.target) && !e.target.closest('#triggerSettings')) {
                document.getElementById('settingsPanel').classList.remove('active');
            }
        });

        setTimeout(() => {
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').style.display = 'none', 600);
        }, 800);
    };
</script>
</body>
</html>
